name: bump zenv

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tap
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Update formula to latest zenv release
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          repo="m-mizutani/zenv"
          formula="Formula/zenv.rb"

          latest_tag=$(gh release view --repo "$repo" --json tagName --jq .tagName)
          latest_version=${latest_tag#v}
          current_version=$(sed -n 's/^  version "\(.*\)"$/\1/p' "$formula")

          echo "current=$current_version latest=$latest_version"
          if [ "$current_version" = "$latest_version" ]; then
            echo "Already up to date."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          declare -A sha
          for platform in darwin-amd64 darwin-arm64 linux-amd64 linux-arm64; do
            asset="zenv-${latest_tag}-${platform}.tar.gz"
            gh release download "$latest_tag" --repo "$repo" --pattern "$asset" --output "$asset"
            sha[$platform]=$(sha256sum "$asset" | cut -d' ' -f1)
            rm -f "$asset"
          done

          cat > "$formula" <<EOF
          class Zenv < Formula
            desc "Enhanced env command to manage environment variables in CLI"
            homepage "https://github.com/m-mizutani/zenv"
            version "${latest_version}"
            license "Apache-2.0"

            livecheck do
              url :stable
              strategy :github_latest
            end

            on_macos do
              on_arm do
                url "https://github.com/m-mizutani/zenv/releases/download/v#{version}/zenv-v#{version}-darwin-arm64.tar.gz"
                sha256 "${sha[darwin-arm64]}"
              end
              on_intel do
                url "https://github.com/m-mizutani/zenv/releases/download/v#{version}/zenv-v#{version}-darwin-amd64.tar.gz"
                sha256 "${sha[darwin-amd64]}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/m-mizutani/zenv/releases/download/v#{version}/zenv-v#{version}-linux-arm64.tar.gz"
                sha256 "${sha[linux-arm64]}"
              end
              on_intel do
                url "https://github.com/m-mizutani/zenv/releases/download/v#{version}/zenv-v#{version}-linux-amd64.tar.gz"
                sha256 "${sha[linux-amd64]}"
              end
            end

            def install
              bin.install "zenv"
            end

            test do
              output = shell_output("#{bin}/zenv FOO=bar env")
              assert_match "FOO=bar", output
            end
          end
          EOF

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "version=$latest_version" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.bump.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bump-zenv-${{ steps.bump.outputs.version }}
          commit-message: "zenv ${{ steps.bump.outputs.version }}"
          title: "zenv ${{ steps.bump.outputs.version }}"
          body: |
            Automated update of `zenv` to ${{ steps.bump.outputs.version }}.

            Updated `version` and per-platform `sha256` from the upstream
            release assets at
            https://github.com/m-mizutani/zenv/releases/tag/v${{ steps.bump.outputs.version }}.
          delete-branch: true
